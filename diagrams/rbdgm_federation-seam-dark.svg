sans-serif" font-size="13" lengthAdjust="spacing" textLength="199.5386" x="353.7876" y="196.52">Leg 1 - device flow (RFC 8628)</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg3"><polygon fill="#9DA5B4" points="357.7876,226.7188,347.7876,230.7188,357.7876,234.7188,353.7876,230.7188" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;stroke-dasharray:2,2;" x1="351.7876" x2="569.3262" y1="230.7188" y2="230.7188"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.0791" x="363.7876" y="225.6528">OIDC ID token</text></g><g class="message" data-entity-1="part2" data-entity-2="part4" id="msg4"><polygon fill="#9DA5B4" points="664.5181,255.8516,674.5181,259.8516,664.5181,263.8516,668.5181,259.8516" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;" x1="346.7876" x2="670.5181" y1="259.8516" y2="259.8516"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.5493" x="353.7876" y="254.7856">Leg 2 - STS token-exchange (RFC 8693)</text></g><g class="message" data-entity-1="part4" data-entity-2="part2" id="msg5"><polygon fill="#9DA5B4" points="357.7876,284.9844,347.7876,288.9844,357.7876,292.9844,353.7876,288.9844" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;stroke-dasharray:2,2;" x1="351.7876" x2="675.5181" y1="288.9844" y2="288.9844"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.1201" x="363.7876" y="283.9185">federated token (the assize)</text></g><g class="message" data-entity-1="part2" data-entity-2="part5" id="msg6"><polygon fill="#9DA5B4" points="828.1318,314.1172,838.1318,318.1172,828.1318,322.1172,832.1318,318.1172" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;" x1="346.7876" x2="834.1318" y1="318.1172" y2="318.1172"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="44.7192" x="353.7876" y="313.0513">Leg 3 -</text><text fill="#E6E6E6" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="27.4917" x="402.6392" y="313.0513">don</text><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.7979" x="430.1309" y="313.0513">: generateAccessToken</text></g><g class="message" data-entity-1="part5" data-entity-2="part2" id="msg7"><polygon fill="#9DA5B4" points="357.7876,343.25,347.7876,347.25,357.7876,351.25,353.7876,347.25" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;stroke-dasharray:2,2;" x1="351.7876" x2="839.1318" y1="347.25" y2="347.25"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="159.9229" x="363.7876" y="342.1841">short-lived mantle token</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg8"><polygon fill="#9DA5B4" points="151.21,372.3828,141.21,376.3828,151.21,380.3828,147.21,376.3828" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;stroke-dasharray:2,2;" x1="145.21" x2="345.7876" y1="376.3828" y2="376.3828"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="182.5776" x="157.21" y="371.3169">bare access_token string</text></g><g class="message" data-entity-1="part1" data-entity-2="part6" id="msg9"><polygon fill="#9DA5B4" points="986.1401,401.5156,996.1401,405.5156,986.1401,409.5156,990.1401,405.5156" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;" x1="140.21" x2="992.1401" y1="405.5156" y2="405.5156"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.1924" x="147.21" y="400.4497">Authorization: Bearer &lt;access_token&gt;</text></g><g class="message" data-entity-1="part6" data-entity-2="part1" id="msg10"><polygon fill="#9DA5B4" points="151.21,430.6484,141.21,434.6484,151.21,438.6484,147.21,434.6484" style="stroke:#9DA5B4;stroke-width:1;"/><line style="stroke:#9DA5B4;stroke-width:1;stroke-dasharray:2,2;" x1="145.21" x2="997.1401" y1="434.6484" y2="434.6484"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.0166" x="157.21" y="429.5825">depot response</text></g><path d="M86,447.6484 L86,487.6484 L1051,487.6484 L1051,457.6484 L1041,447.6484 L86,447.6484" fill="#48421F" style="stroke:#9DA5B4;stroke-width:0.5;"/><path d="M1041,447.6484 L1041,457.6484 L1051,457.6484 L1041,447.6484" fill="#48421F" style="stroke:#9DA5B4;stroke-width:0.5;"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="97.1953" x="374.5371" y="464.7153">Downstream is</text><text fill="#E6E6E6" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="87.2295" x="475.8647" y="464.7153">model-blind</text><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.8433" x="567.2266" y="464.7153">- every call site adds Bearer,</text><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.5938" x="374.5371" y="479.8481">knows nothing of the token's origin.</text><path d="M5,497.9141 L5,537.9141 L483,537.9141 L483,507.9141 L473,497.9141 L5,497.9141" fill="#48421F" style="stroke:#9DA5B4;stroke-width:0.5;"/><path d="M473,497.9141 L473,507.9141 L483,507.9141 L473,497.9141" fill="#48421F" style="stroke:#9DA5B4;stroke-width:0.5;"/><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.1895" x="11" y="514.981">One identity-keyed accessor stands in front of ~30 GCP call sites -</text><text fill="#E6E6E6" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="457.0186" x="11" y="530.1138">the single seam where a federated