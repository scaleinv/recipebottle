erif" font-size="14" lengthAdjust="spacing" textLength="48.0361" x="871.9268" y="693.1357">(RBRF)</text></g><path d="M17,166.1875 L17,206.1875 L662,206.1875 L662,176.1875 L652,166.1875 L17,166.1875" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M652,166.1875 L652,176.1875 L662,176.1875 L652,166.1875" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.1216" x="116.8704" y="183.2544">Workforce pool is</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.7056" x="234.1243" y="183.2544">org-level only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.6909" x="338.9622" y="183.2544">-</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="436.3188" x="116.8704" y="198.3872">a plain project cannot hold one. This is the free/paid tier boundary.</text><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg1"><polygon fill="#181818" points="203.7568,228.5859,213.7568,232.5859,203.7568,236.5859,207.7568,232.5859" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="59.2241" x2="209.7568" y1="232.5859" y2="232.5859"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.5327" x="66.2241" y="227.52">configure federation</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg2"><polygon fill="#181818" points="609.8223,257.7188,619.8223,261.7188,609.8223,265.7188,613.8223,261.7188" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="261.7188" y2="261.7188"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="102.8384" x="222.7568" y="256.6528">create org-level</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="109.6685" x="329.7275" y="256.6528">workforce pool</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg3"><polygon fill="#181818" points="609.8223,301.9844,619.8223,305.9844,609.8223,309.9844,613.8223,305.9844" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="305.9844" y2="305.9844"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="41.5518" x="222.7568" y="285.7856">create</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="62.1118" x="268.4409" y="285.7856">provider</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="47.8867" x="334.6851" y="285.7856">in pool,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.1748" x="222.7568" y="300.9185">trust external IdP (OIDC / SAML 2.0)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg4"><polygon fill="#181818" points="609.8223,346.25,619.8223,350.25,609.8223,354.25,613.8223,350.25" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="350.25" y2="350.25"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="19.8682" x="222.7568" y="330.0513">set</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="134.1323" x="246.7573" y="330.0513">attribute mapping</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="382.0654" x="222.7568" y="345.1841">google.subject &lt;- immutable IdP claim (sub/oid, &lt;=127 B)</text></g><path d="M626,363.25 L626,388.25 L871,388.25 L871,373.25 L861,363.25 L626,363.25" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M861,363.25 L861,373.25 L871,373.25 L861,363.25" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.9609" x="632" y="380.3169">a *mutable* claim invites spoofing</text><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg5"><polygon fill="#181818" points="609.8223,425.6484,619.8223,429.6484,609.8223,433.6484,613.8223,429.6484" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="429.6484" y2="429.6484"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.8945" x="222.7568" y="409.4497">grant depot capability to federated principal</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.1211" x="222.7568" y="424.5825">principal://.../workforcePools/POOL/subject/SUBJECT</text></g><g class="message" data-entity-1="part1" data-entity-2="part5" id="msg6"><polygon fill="#181818" points="883.9448,469.9141,893.9448,473.9141,883.9448,477.9141,887.9448,473.9141" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="59.2241" x2="889.9448" y1="473.9141" y2="473.9141"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.9033" x="66.2241" y="453.7153">record federation facts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5615" x="66.2241" y="468.8481">pool, provider, attribute mapping, IdP endpoints</text></g><path d="M900,486.9141 L900,526.9141 L1344,526.9141 L1344,496.9141 L1334,486.9141 L900,486.9141" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1334,486.9141 L1334,496.9141 L1344,496.9141 L1334,486.9141" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.7578" x="906" y="503.981">RBRF is org-scoped and committed -</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="423.6108" x="906" y="519.1138">one pool serves every depot under the manor; carries no secrets</text><path d="M5,537.1797 L5,592.1797 L799,592.1797 L799,547.1797 L789,537.1797 L5,537.1797" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M789,537.1797 L789,547.1797 L799,547.1797 L789,537.1797" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.3257" x="210.895" y="554.2466">Identity proofing lives entirely in the IdP.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.5723" x="210.895" y="569.3794">RBK only grants capability to an already-known principal;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7144" x="210.895" y="584.5122">the depot remains home of the role-to-identity roster.</text><path d="M169,602.5781 L169,642.5781 L668,642.5781 L668,612.5781 L658,602.5781 L169,602.5781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M658,602.5781 L658,612.5781 L668,612.5781 L658,602.5781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.1201" x="269.4587" y="619.645">gcloud / REST touches</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="76.9717" x="418.7112" y="619.645">setup only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.0806" x="269.4587" y="634.7778">(pool &amp; provider creation) -</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="104.2539" x="450.6716" y="634.7778">never runtime</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="554.9255" y="634.7778">.</text><?plantuml-src TLHXJzim4FsUNt7YmmHMax1A6nAmIHJAn0QYQekcIVtYncxguTn5jbFMVxzpKafRDYbIelZktTrxxnnCi1fkjT9E1aC84nsQ6b8Wr6ambUx1IAx9fTue3JcGAq6gok0C9zIuGfz3fIjA-wVzpwUV-cSfrH694mh7e1YCj6b5IbkVLIf9PC5dSDHYpl1u2tTo1DB3wEhNupYffGkcCBN404TbOQbHN7ayd4mvmxVz4Tfrbp8PJfz6-odVhaTmT_NGmQTMhxJjOlddVkJmJz0EfOKxDUBmnxkRQwuqkNguXtvskacwEO3V8SlfaYdYpF5WVDk5nwyaGGeQQALTDr8lbePp-4dkUK7C6jH45em78ROzjaC90UaC9THM6eJQqMzT12WaCY8ioQeeJ0RJ9UVo4vOQ5axhl9P6GJ1SS4uDAkdMMPAqjI7zsf74zGl2XIaRnqdR8PBkaAEw7bat6PlVjYN4orxRGlmdHGZkTyK-SJn5x9w3UpCChl41z0xLy8xfGqHMcU5a2CxC6uQkP5qRB8MOOKbKMftvPjvISvc2gQeco3dxE68Np5m5ntoUar4zkFpoiNy6WvDE4sVAPG1QREf849jSiKaqk391U_3S_O9B7dPMkcW2fMkAijHoRgm9QmZqIgbMB9l1w1Oxm-tdUPvdMPPlgHmnEJuVFJxUvvjHyidJuFlmUhgZMpGJrtIw8ATsD8C5xv5dzCWmlBBUWtU4zLfADAgQ30P_mC46ldsncQBalk05LY1HiLcgoeGu3pkINTTvrcktOdhO6MwzeO7znhwBLgmaahjWNfmp78J4uMmEBloFZRY9ZhnhxmWca8Te-GPhMdp-wxHTHnz5P1uZc-5uyAFTaau5Vo20H92MhQZMwJFI2xxfSC4kP92kNQShtYtFsrJfo48ySMJvkgFKlBRZoBDVivssMn-yBlBUhSIrcsAfupA_tKxHgiSjOn-s0dMBmlgTy0Kh14OImJKOxraXikGl?></g></svg>